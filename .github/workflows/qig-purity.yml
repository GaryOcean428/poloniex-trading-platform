# QIG Purity Gate — static scan for forbidden vocabulary on the kernel path.
#
# Per QIG_PURITY_KERNEL_REFERENCE.md §5 verification gate 1.
# Scans for forbidden patterns; fails closed if any banned pattern hits.
# No untrusted input — uses only checked-out repo contents.
#
# MIG-5 (2026-05-16): scan extended to the full ml-worker tree.
# Post-MIG-1+2+3+4 there is no legacy ML-prediction layer (no
# TF/sklearn/statsmodels/prophet), no flag-gated bespoke regime detector,
# and no Adam fallback in proprietary_core/training.py. The optimizer
# allowlist exempting proprietary_core is therefore retired — the full
# ml-worker/src tree must pass the purity gate uniformly.

name: QIG Purity Gate

on:
  pull_request:
    paths:
      - 'apps/api/src/services/monkey/**'
      - 'apps/api/src/services/agent_*.ts'
      - 'ml-worker/**'
  push:
    branches: [main]
    paths:
      - 'apps/api/src/services/monkey/**'
      - 'apps/api/src/services/agent_*.ts'
      - 'ml-worker/**'

jobs:
  purity-scan:
    name: Forbidden vocabulary scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for banned distance metrics (code only, not comments)
        run: |
          set -u
          PATTERNS=(
            'cosine_similarity'
            'cosine\s*\('
            'np\.dot'
            'numpy\.dot'
            'np\.linalg\.norm'
            'euclidean_distance'
            'mahalanobis'
            'lorentzian_distance'
            'math\.log\(1\s*\+\s*math\.abs'
            'Math\.log\(1\s*\+\s*Math\.abs'
          )
          fail=0
          for pat in "${PATTERNS[@]}"; do
            # Match the pattern, then exclude lines whose first non-blank
            # character is a comment marker (// /* * # ).
            hits=$(grep -rEn "$pat" \
              apps/api/src/services/monkey \
              apps/api/src/services/agent_L_classifier.ts \
              ml-worker/src \
              ml-worker/main.py \
              --include='*.ts' --include='*.js' --include='*.py' \
              --exclude='QIG_PURITY_KERNEL_REFERENCE.md' \
              --exclude='*.test.ts' --exclude='*_test.py' \
              --exclude='__init__.py' \
              --exclude-dir='tests' --exclude-dir='__pycache__' \
              2>/dev/null \
              | grep -Ev ':[[:space:]]*(//|\*|#|/\*)' \
              || true)
            if [ -n "$hits" ]; then
              printf '::error::Banned distance pattern: %s\n' "$pat"
              printf '%s\n' "$hits"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            printf '::error::QIG purity violation. See apps/api/src/services/monkey/QIG_PURITY_KERNEL_REFERENCE.md §2.\n'
            exit 1
          fi

      - name: Scan for banned optimizers / normalizers (code only)
        # MIG-5 (2026-05-16): proprietary_core is now in scope. The
        # optimizer allowlist that previously exempted training.py
        # (USE_FISHER_RAO=false fallback to torch.optim.Adam) is gone;
        # the Adam fallback has been removed and natural-gradient is
        # the sole training path.
        run: |
          set -u
          PATTERNS=(
            'torch\.optim\.Adam'
            'AdamW'
            'LayerNorm'
            'BatchNorm'
            'RMSNorm'
          )
          fail=0
          for pat in "${PATTERNS[@]}"; do
            hits=$(grep -rEn "$pat" \
              apps/api/src/services/monkey \
              apps/api/src/services/agent_L_classifier.ts \
              ml-worker/src \
              ml-worker/main.py \
              --include='*.ts' --include='*.js' --include='*.py' \
              --exclude='QIG_PURITY_KERNEL_REFERENCE.md' \
              --exclude='*.test.ts' --exclude='*_test.py' \
              --exclude='__init__.py' \
              --exclude-dir='tests' --exclude-dir='__pycache__' \
              2>/dev/null \
              | grep -Ev ':[[:space:]]*(//|\*|#|/\*)' \
              || true)
            if [ -n "$hits" ]; then
              printf '::error::Banned optimizer/normalizer: %s\n' "$pat"
              printf '%s\n' "$hits"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            printf '::error::QIG purity violation. See QIG_PURITY_KERNEL_REFERENCE.md §2.\n'
            exit 1
          fi

      - name: Scan for arithmetic averaging of basins (warning)
        run: |
          set -u
          hits=$(grep -rEn '(np\.mean|numpy\.mean|lodash\.mean|d3\.mean)\(.*basin' \
            apps/api/src/services/monkey \
            apps/api/src/services/agent_L_classifier.ts \
            ml-worker/src \
            ml-worker/main.py \
            --include='*.ts' --include='*.js' --include='*.py' \
            --exclude='QIG_PURITY_KERNEL_REFERENCE.md' \
            --exclude='*.test.ts' --exclude='*_test.py' \
            --exclude-dir='tests' --exclude-dir='__pycache__' \
            2>/dev/null || true)
          if [ -n "$hits" ]; then
            printf '::warning::Potential arithmetic averaging on basins:\n'
            printf '%s\n' "$hits"
            printf '::warning::Verify these use frechetMean() — QIG_PURITY_KERNEL_REFERENCE.md §1.\n'
          fi

      - name: Summary
        if: always()
        run: |
          printf 'QIG Purity scan complete.\n'
          printf 'Reference: apps/api/src/services/monkey/QIG_PURITY_KERNEL_REFERENCE.md\n'
