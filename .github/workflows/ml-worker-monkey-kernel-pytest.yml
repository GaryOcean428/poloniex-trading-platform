name: ML Worker Monkey Kernel Pytest

on:
  push:
    branches: [main]
    paths:
      - "ml-worker/**"
      - ".github/workflows/ml-worker-monkey-kernel-pytest.yml"
  pull_request:
    branches: [main]
    paths:
      - "ml-worker/**"
      - ".github/workflows/ml-worker-monkey-kernel-pytest.yml"

jobs:
  monkey-kernel-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ml-worker dependencies
        working-directory: ml-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run monkey-kernel pytest suite
        working-directory: ml-worker
        env:
          PYTHONPATH: src
        run: python -m pytest tests/monkey_kernel -q
